<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青井直次郎、セキュリティロック解除　報告メール</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      padding: 16px;
      background: #e9eef3;
      color: #222;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    body.drag-lock {
      overflow: hidden;
      touch-action: none;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100%;
      max-width: 760px;
    }

    .mail {
      width: 100%;
      overflow: hidden;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 20px 42px rgba(0, 0, 0, 0.18);
      transition: transform 0.5s ease, opacity 0.5s ease;
    }

    .mail.sending {
      transform: translateY(-16px);
      opacity: 0.5;
    }

    .header {
      padding: 16px 18px;
      background: #2f3542;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.5;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      background: #fff;
      border-bottom: 1px solid #e2e7ed;
    }

    .label {
      width: 84px;
      flex: 0 0 84px;
      color: #68707a;
      font-size: 14px;
    }

    .value {
      min-width: 0;
      flex: 1;
      font-size: 15px;
      line-height: 1.7;
      overflow-wrap: anywhere;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 180px;
      padding: 0;
      border: 0;
      outline: 0;
      resize: vertical;
      background: transparent;
      color: #222;
      font-size: 15px;
      line-height: 1.8;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      background: #fff;
    }

    .status {
      min-height: 21px;
      color: #68707a;
      font-size: 14px;
    }

    .send-button,
    .notification,
    .modal-close,
    .hint-button,
    .attachment-button,
    .x-button,
    .puzzle-reset,
    .puzzle-close {
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    .send-button:hover,
    .notification:hover,
    .modal-close:hover,
    .hint-button:hover,
    .attachment-button:hover,
    .x-button:hover,
    .puzzle-reset:hover,
    .puzzle-close:hover {
      transform: translateY(-1px);
    }

    .send-button {
      min-width: 112px;
      padding: 11px 18px;
      background: #1d72f3;
      color: #fff;
      font-size: 14px;
    }

    .send-button:disabled {
      background: #b9c7da;
      cursor: not-allowed;
      transform: none;
    }

    .notification-area {
      margin-top: 16px;
      text-align: center;
    }

    .notification {
      display: none;
      width: 100%;
      max-width: 360px;
      padding: 14px 20px;
      background: #fff;
      color: #1f2937;
      font-size: 15px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
    }

    .notification.show {
      display: inline-block;
      animation: notice-in 0.28s ease both;
    }

    @keyframes notice-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fiction-note {
      margin-top: 14px;
      color: #6b7280;
      font-size: 12px;
      line-height: 1.7;
      text-align: center;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(20, 28, 38, 0.55);
    }

    .overlay.show {
      display: flex;
    }

    .reply-modal {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 720px;
      max-height: 90vh;
      overflow: hidden;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 18px;
      background: #2f3542;
      color: #fff;
      font-weight: 700;
    }

    .modal-close {
      width: 34px;
      height: 34px;
      padding: 0;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      font-size: 19px;
      line-height: 1;
    }

    .reply-meta {
      background: #fff;
      border-bottom: 1px solid #e2e7ed;
    }

    .reply-body {
      padding: 18px;
      overflow-y: auto;
      overscroll-behavior: contain;
      background: #fff;
    }

    .reply-text {
      min-height: 120px;
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 15px;
      line-height: 1.9;
    }

    .reply-extras {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
    }

    .attachment-card {
      width: 100%;
      padding: 12px;
      background: #f8fafc;
      border: 1px solid #d6dde7;
      border-radius: 12px;
    }

    .attachment-name {
      margin-bottom: 10px;
      color: #5b6470;
      font-size: 13px;
    }

    .attachment-image {
      display: block;
      width: 100%;
      max-width: 430px;
      max-height: 330px;
      margin: 0 auto;
      object-fit: contain;
      background: #fff;
      border: 1px solid #d6dde7;
      border-radius: 10px;
    }

    .hint-button,
    .attachment-button,
    .x-button,
    .puzzle-reset,
    .puzzle-close {
      width: 100%;
      max-width: 430px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .hint-button {
      background: #edf3ff;
      color: #1f3f78;
    }

    .attachment-button {
      background: #eaf6ed;
      color: #195d2e;
    }

    .x-button {
      background: #111827;
      color: #fff;
    }

    .story-note {
      width: 100%;
      padding: 10px 12px;
      background: #fff8dd;
      color: #6b5600;
      border: 1px solid #f2e19b;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.7;
    }

    /* =========================================================
       画像重ね合わせ謎：ここから
       ========================================================= */

    .puzzle-overlay {
      position: fixed;
      inset: 0;
      z-index: 1100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background: rgba(8, 15, 28, 0.76);
    }

    .puzzle-overlay.show {
      display: flex;
    }

    .puzzle-modal {
      width: 100%;
      max-width: 900px;
      max-height: 96vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
    }

    .puzzle-header {
      padding: 14px 18px;
      background: #2f3542;
      color: #fff;
      font-weight: 700;
    }

    .puzzle-content {
      padding: 16px;
    }

    .puzzle-description {
      margin: 0 0 14px;
      color: #485260;
      font-size: 14px;
      line-height: 1.75;
    }

    .puzzle-stage-frame {
      width: 100%;
      overflow: hidden;
      background: #f4f6f8;
      border: 1px solid #d8dee8;
      border-radius: 12px;
    }

    .puzzle-stage {
      position: relative;
      width: 100%;
      /* 謎画像を読み込んだ後、画像本来の縦横比に自動変更します */
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #f2f2f2;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .puzzle-paper {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    .puzzle-key-canvas {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 2;
      display: block;
      max-width: none;
      max-height: none;
      object-fit: contain;
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .puzzle-key-canvas.dragging {
      cursor: grabbing;
      filter: drop-shadow(0 5px 5px rgba(0, 0, 0, 0.25));
    }

    .puzzle-key-canvas.snapped {
      animation: key-snap 0.2s ease both;
    }

    @keyframes key-snap {
      0% { transform: scale(1); }
      50% { transform: scale(1.025); }
      100% { transform: scale(1); }
    }

    .puzzle-error {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      background: #fff1f1;
      color: #8a2525;
      border: 1px solid #efc3c3;
      border-radius: 9px;
      font-size: 13px;
      line-height: 1.6;
    }

    .puzzle-error.show {
      display: block;
    }

    .puzzle-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
    }

    .puzzle-reset {
      background: #edf3ff;
      color: #1f3f78;
    }

    .puzzle-close {
      background: #f0f1f3;
      color: #374151;
    }

    /* 画像重ね合わせ謎：ここまで */

    @media (max-width: 640px) {
      body {
        align-items: flex-start;
        padding: 12px;
      }

      .header,
      .modal-header,
      .puzzle-header {
        font-size: 16px;
      }

      .row {
        flex-direction: column;
        align-items: flex-start;
        gap: 5px;
      }

      .label {
        width: auto;
        flex-basis: auto;
      }

      textarea {
        min-height: 160px;
      }

      .footer {
        flex-direction: column;
        align-items: stretch;
      }

      .send-button {
        width: 100%;
      }

      .reply-body,
      .puzzle-content {
        padding: 14px;
      }

      .puzzle-overlay {
        align-items: flex-start;
        padding: 8px;
      }

      .puzzle-modal {
        max-height: calc(100vh - 16px);
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section id="mailCard" class="mail">
      <header class="header">青井直次郎、セキュリティロック解除　報告メール</header>

      <div class="row">
        <div class="label">To</div>
        <div class="value">N.F@koreha.fiction.da</div>
      </div>

      <div class="row">
        <div class="label">Subject</div>
        <div class="value">青井直次郎、セキュリティロック解除の報告</div>
      </div>

      <div class="row">
        <div class="label">本文</div>
        <div class="value">
          <textarea id="mailInput" placeholder="ここに報告内容を入力してください。"></textarea>
        </div>
      </div>

      <footer class="footer">
        <div id="sendStatus" class="status" aria-live="polite"></div>
        <button id="sendButton" class="send-button" type="button" disabled>送信する</button>
      </footer>
    </section>

    <div class="notification-area">
      <button id="notification" class="notification" type="button">📩 新着メール 1件</button>
    </div>

    <p class="fiction-note">
      本作品はフィクションです。実際の地名・団体・人物とは一切関係ございません。
    </p>
  </main>

  <!-- 返信メール -->
  <div id="replyOverlay" class="overlay" aria-hidden="true">
    <section class="reply-modal" role="dialog" aria-modal="true" aria-labelledby="replyTitle">
      <header class="modal-header">
        <span id="replyTitle">返信メール</span>
        <button id="closeReplyButton" class="modal-close" type="button" aria-label="返信メールを閉じる">×</button>
      </header>

      <div class="reply-meta">
        <div class="row">
          <div class="label">From</div>
          <div class="value">N.F@koreha.fiction.da</div>
        </div>
        <div class="row">
          <div class="label">Subject</div>
          <div class="value">RE: 青井直次郎、セキュリティロック解除の報告</div>
        </div>
      </div>

      <div class="reply-body">
        <p id="replyText" class="reply-text"></p>
        <div id="replyExtras" class="reply-extras"></div>
      </div>
    </section>
  </div>

  <!-- =========================================================
       画像重ね合わせ謎：添付資料画面
       ========================================================= -->
  <div id="puzzleOverlay" class="puzzle-overlay" aria-hidden="true">
    <section class="puzzle-modal" role="dialog" aria-modal="true" aria-labelledby="puzzleTitle">
      <header id="puzzleTitle" class="puzzle-header">添付資料</header>

      <div class="puzzle-content">
        <p class="puzzle-description">
          鍵を指やマウスで動かし、画像に重ねて確認してください。<br>
          見えた4桁の数字は、メール画面に戻って報告してください。
        </p>

        <div class="puzzle-stage-frame">
          <div id="puzzleStage" class="puzzle-stage">
            <!-- 下に固定する画像 -->
            <img
              id="puzzlePaper"
              class="puzzle-paper"
              src="file006_謎.jpg"
              alt="謎の画像"
              draggable="false"
            >

            <!-- 上で動かす鍵。透明部分をJavaScriptで自動的に切り抜いて表示します -->
            <canvas
              id="puzzleKeyCanvas"
              class="puzzle-key-canvas"
              aria-label="動かせる鍵"
            ></canvas>
          </div>
        </div>

        <div id="puzzleError" class="puzzle-error" aria-live="polite"></div>

        <div class="puzzle-actions">
          <button id="resetKeyButton" class="puzzle-reset" type="button">鍵を最初の位置に戻す</button>
          <button id="closePuzzleButton" class="puzzle-close" type="button">資料を閉じる</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    "use strict";

    /* =========================================================
       調整しやすい設定
       ========================================================= */

    // 4桁の正解数字
    const correctCode = "4631";

    // 画像重ね合わせ謎：画像ファイル名
    const puzzlePaperFile = "file006_謎.jpg";
    const puzzleKeyFile = "file006_鍵.png";

    // 画像重ね合わせ謎：鍵を時計回りに回転させる角度
    // 参考画像と同じ縦向きで使用するため0度です。
    const puzzleKeyRotation = 0;

    // 画像重ね合わせ謎：鍵の高さ
    // 新しい鍵画像を、参考画像とほぼ同じ大きさで表示する設定です。
    // 謎画像の高さに対して約81％の高さで表示します。
    const puzzleKeyHeightRatio = 0.81;

    // 画像重ね合わせ謎：鍵の初期位置（左上を基準にした％）
    const puzzleKeyStart = { x: 3, y: 20 };

    // 画像重ね合わせ謎：鍵の正解位置（左上を基準にした％）
    // 新しい鍵画像の透明余白を含め、参考画像と同じ位置に重なる設定です。
    const puzzleKeyTarget = { x: 33.6, y: 4.1 };

    // 画像重ね合わせ謎：正解位置と判定する範囲（％）
    const puzzleCorrectRange = 3.5;

    // 画像重ね合わせ謎：正解位置に吸着する距離（％）
    const puzzleSnapDistance = 6;

    // 返信メールの文字表示速度。数字を小さくすると速くなります。
    const typingSpeed = 24;

    /* =========================================================
       X投稿文
       ========================================================= */

    const file005PostText =
      "【File005：おりたたみ探偵事務所　セキュリティロック解除】\n" +
      "あなたはパスワードを特定し、\n" +
      "N.Fに報告した\n" +
      "#おりたたみ探偵事務所 #謎解き";

    const nfPostText =
      "【おりたたみ探偵file004】N.Fについて少し知ることができた！\n" +
      "※N.Fについてで聞けるストーリーはネタバレOK◎";

    /* =========================================================
       要素取得
       ========================================================= */

    const mailCard = document.getElementById("mailCard");
    const mailInput = document.getElementById("mailInput");
    const sendButton = document.getElementById("sendButton");
    const sendStatus = document.getElementById("sendStatus");
    const notification = document.getElementById("notification");

    const replyOverlay = document.getElementById("replyOverlay");
    const closeReplyButton = document.getElementById("closeReplyButton");
    const replyText = document.getElementById("replyText");
    const replyExtras = document.getElementById("replyExtras");

    const puzzleOverlay = document.getElementById("puzzleOverlay");
    const puzzleStage = document.getElementById("puzzleStage");
    const puzzlePaper = document.getElementById("puzzlePaper");
    const puzzleKeyCanvas = document.getElementById("puzzleKeyCanvas");
    const puzzleError = document.getElementById("puzzleError");
    const resetKeyButton = document.getElementById("resetKeyButton");
    const closePuzzleButton = document.getElementById("closePuzzleButton");

    const keyCanvasContext = puzzleKeyCanvas.getContext("2d", { willReadFrequently: true });

    /* =========================================================
       状態
       ========================================================= */

    let currentReply = null;
    let typingTimer = null;

    let keyPosition = {
      x: puzzleKeyStart.x,
      y: puzzleKeyStart.y
    };

    // 回転・切り抜き後の鍵画像本来のピクセルサイズ
    // 横幅と高さを別々に引き延ばさず、常に同じ倍率で表示します。
    let keyNaturalSize = {
      width: 1,
      height: 1
    };

    let keyPrepared = false;
    let dragging = false;
    let activePointerId = null;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    puzzlePaper.src = puzzlePaperFile;

    /* =========================================================
       メール画面
       ========================================================= */

    mailInput.addEventListener("input", function () {
      sendButton.disabled = mailInput.value.trim() === "";
    });

    sendButton.addEventListener("click", sendMail);
    notification.addEventListener("click", openReply);
    closeReplyButton.addEventListener("click", closeReply);

    replyOverlay.addEventListener("click", function (event) {
      if (event.target === replyOverlay) {
        closeReply();
      }
    });

    function normalizeText(value) {
      return String(value || "")
        .normalize("NFKC")
        .toLowerCase()
        .replace(/[\s　.．・_-]+/g, "");
    }

    function includesAny(text, words) {
      return words.some(function (word) {
        return text.includes(normalizeText(word));
      });
    }

    function sendMail() {
      const inputValue = mailInput.value.trim();

      if (!inputValue) {
        return;
      }

      currentReply = createReply(inputValue);

      notification.classList.remove("show");
      mailCard.classList.add("sending");
      sendStatus.textContent = "送信中…";
      sendButton.disabled = true;

      window.setTimeout(function () {
        mailCard.classList.remove("sending");
        sendStatus.textContent = "送信済み";
        notification.classList.add("show");

        mailInput.value = "";
        sendButton.disabled = true;

        window.setTimeout(function () {
          if (!replyOverlay.classList.contains("show")) {
            sendStatus.textContent = "";
          }
        }, 1200);
      }, 950);
    }

    function openReply() {
      if (!currentReply) {
        return;
      }

      notification.classList.remove("show");
      replyOverlay.classList.add("show");
      replyOverlay.setAttribute("aria-hidden", "false");
      renderReply(currentReply);
    }

    function closeReply() {
      stopTyping();
      closePuzzle();

      replyOverlay.classList.remove("show");
      replyOverlay.setAttribute("aria-hidden", "true");
      replyText.textContent = "";
      replyExtras.innerHTML = "";
      sendStatus.textContent = "";

      window.setTimeout(function () {
        mailInput.focus();
      }, 0);
    }

    function stopTyping() {
      if (typingTimer !== null) {
        window.clearTimeout(typingTimer);
        typingTimer = null;
      }
    }

    function typeText(text, target, finished) {
      stopTyping();
      target.textContent = "";

      let index = 0;

      function typeNextCharacter() {
        target.textContent = text.slice(0, index);
        index += 1;

        if (index <= text.length) {
          typingTimer = window.setTimeout(typeNextCharacter, typingSpeed);
        } else {
          typingTimer = null;
          if (typeof finished === "function") {
            finished();
          }
        }
      }

      typeNextCharacter();
    }

    function renderReply(replyData) {
      replyText.textContent = "";
      replyExtras.innerHTML = "";

      typeText(replyData.lines.join("\n"), replyText, function () {
        renderReplyExtras(replyData);
      });
    }

    function renderReplyExtras(replyData) {
      replyExtras.innerHTML = "";

      if (replyData.attachment) {
        const attachmentCard = document.createElement("div");
        attachmentCard.className = "attachment-card";

        const attachmentName = document.createElement("div");
        attachmentName.className = "attachment-name";
        attachmentName.textContent = replyData.attachment.label;

        const attachmentImage = document.createElement("img");
        attachmentImage.className = "attachment-image";
        attachmentImage.src = replyData.attachment.src;
        attachmentImage.alt = replyData.attachment.alt;

        attachmentCard.appendChild(attachmentName);
        attachmentCard.appendChild(attachmentImage);
        replyExtras.appendChild(attachmentCard);
      }

      if (replyData.note) {
        const note = document.createElement("div");
        note.className = "story-note";
        note.textContent = replyData.note;
        replyExtras.appendChild(note);
      }

      if (Array.isArray(replyData.controls)) {
        replyData.controls.forEach(function (control) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = control.className || "hint-button";
          button.textContent = control.label;
          button.addEventListener("click", control.onClick);
          replyExtras.appendChild(button);
        });
      }

      if (replyData.xPostText) {
        const xButton = document.createElement("button");
        xButton.type = "button";
        xButton.className = "x-button";
        xButton.textContent = "Xで報告する";
        xButton.addEventListener("click", function () {
          postToX(replyData.xPostText);
        });
        replyExtras.appendChild(xButton);
      }
    }

    function postToX(text) {
      const postUrl = "https://x.com/intent/tweet?text=" + encodeURIComponent(text);
      window.open(postUrl, "_blank", "noopener,noreferrer");
    }

    /* =========================================================
       反応ワードと返信内容
       ========================================================= */

    function createReply(inputValue) {
      const text = normalizeText(inputValue);

      const hasCorrectCode = text.includes(normalizeText(correctCode));
      const hasPot = includesAny(text, ["鉢植え", "はちうえ"]);
      const hasKey = text.includes(normalizeText("鍵"));
      const hasMilk = text.includes(normalizeText("ミルク"));
      const hasHint = includesAny(text, ["わからない", "ヒント"]);
      const hasNfStory = includesAny(text, ["N.Fについて", "NFについて"]);

      const hasOverlayWord = text.includes(normalizeText("重"));
      const hasPuzzleWord = includesAny(text, [
        "謎",
        "メール画面",
        "最初やつ",
        "最初のやつ"
      ]);

      const hasOverlayCombination = hasKey && hasPuzzleWord && hasOverlayWord;

      // 正解数字を最優先
      if (hasCorrectCode) {
        return {
          lines: [
            "【古本持ち去り事件の報告を受領した】",
            "そうか…最初の謎と鍵はセットだったのか…！",
            "君の謎解き力にいつも助けられている。",
            "ありがとう。次も頼むよ。",
            "しかし…君と謎を解いていると事件によく遭遇するな…"
          ],
          xPostText: file005PostText
        };
      }

      // 「鍵」＋「謎／メール画面／最初のやつ」＋「重」
      if (hasOverlayCombination) {
        return {
          lines: [
            "重ねるのか…！……しかしどのように重ねればよいだろうか？"
          ],
          controls: [
            {
              label: "添付資料を確認する",
              className: "attachment-button",
              onClick: openPuzzle
            }
          ]
        };
      }

      if (hasPot) {
        return {
          lines: [
            "なるほど…どかしてみよう。",
            "一つ鍵が出てきたようだ…",
            "オートロックのようでこの鍵では扉はあかないようだ…ほかに使い道があるのだろうか…？"
          ],
          attachment: {
            src: puzzleKeyFile,
            alt: "見つかった鍵",
            label: "添付画像：" + puzzleKeyFile
          }
        };
      }

      if (hasNfStory) {
        return {
          lines: [
            "しかし頭の回転が遅く、私にはこの手の謎は難しい…",
            "小説の中の登場人物にあこがれて探偵になったんだがな"
          ],
          note: "※N.Fについてで聞けるストーリーはネタバレOK◎",
          xPostText: nfPostText
        };
      }

      if (hasHint) {
        return createHintStep0();
      }

      if (hasMilk) {
        return {
          lines: [
            "ミルクちゃんはちゃんとご主人に返したよ。"
          ]
        };
      }

      if (hasKey) {
        return {
          lines: [
            "鍵を使用できる場所やものは見当たらないな…"
          ]
        };
      }

      return {
        lines: [
          "条件に合う内容が確認できない。",
          "もう一度整理して報告してくれ。"
        ]
      };
    }

    /* =========================================================
       段階式ヒント
       ========================================================= */

    function createHintStep0() {
      return {
        lines: [
          "一緒に思考を整理しよう。まずは君の推理を聞かせてくれ。"
        ],
        controls: [
          {
            label: "① 画像に",
            className: "hint-button",
            onClick: function () {
              renderReply(createHintStep1());
            }
          }
        ]
      };
    }

    function createHintStep1() {
      return {
        lines: [
          "8の上に何かあるようだな…？"
        ],
        controls: [
          {
            label: "② 次に進んだがどうしたらいいかわからない",
            className: "hint-button",
            onClick: function () {
              renderReply(createHintStep2());
            }
          }
        ]
      };
    }

    function createHintStep2() {
      return {
        lines: [
          "鍵の頭のこの形…どこかで見たような…？"
        ],
        controls: [
          {
            label: "③ 鍵の使い方はわかった",
            className: "hint-button",
            onClick: function () {
              renderReply(createHintStep3());
            }
          }
        ]
      };
    }

    function createHintStep3() {
      return {
        lines: [
          "重ねてみて、見える数字を上から教えてくれ"
        ]
      };
    }

    /* =========================================================
       画像重ね合わせ謎：画像の準備
       ========================================================= */

    function showPuzzleError(message) {
      puzzleError.textContent = message;
      puzzleError.classList.add("show");
    }

    function clearPuzzleError() {
      puzzleError.textContent = "";
      puzzleError.classList.remove("show");
    }

    function prepareKeyImage() {
      return new Promise(function (resolve, reject) {
        const sourceImage = new Image();

        sourceImage.onload = function () {
          try {
            // 新しい鍵画像は503×1005pxです。
            // 透明部分も含め、元画像全体をそのまま使います。
            const sourceCanvas = document.createElement("canvas");
            const sourceContext = sourceCanvas.getContext("2d");

            sourceCanvas.width = sourceImage.naturalWidth;
            sourceCanvas.height = sourceImage.naturalHeight;
            sourceContext.clearRect(0, 0, sourceCanvas.width, sourceCanvas.height);
            sourceContext.drawImage(sourceImage, 0, 0);

            // 横幅と高さには必ず同じ倍率を使うため、引き延ばされません。
            drawRotatedKey(sourceCanvas, puzzleKeyRotation);

            keyNaturalSize.width = puzzleKeyCanvas.width;
            keyNaturalSize.height = puzzleKeyCanvas.height;

            keyPrepared = true;
            updateKeyDisplaySize();
            resetKeyPosition();
            resolve();
          } catch (error) {
            reject(error);
          }
        };

        sourceImage.onerror = function () {
          reject(new Error(puzzleKeyFile + "を読み込めませんでした。"));
        };

        sourceImage.src = puzzleKeyFile;
      });
    }

    function findVisibleBounds(pixelData, width, height) {
      const cornerIndex = 0;
      const cornerColor = {
        red: pixelData[cornerIndex],
        green: pixelData[cornerIndex + 1],
        blue: pixelData[cornerIndex + 2],
        alpha: pixelData[cornerIndex + 3]
      };

      let left = width;
      let top = height;
      let right = -1;
      let bottom = -1;

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const index = (y * width + x) * 4;
          const red = pixelData[index];
          const green = pixelData[index + 1];
          const blue = pixelData[index + 2];
          const alpha = pixelData[index + 3];

          let visible = false;

          if (cornerColor.alpha < 20) {
            visible = alpha > 20;
          } else {
            const colorDifference =
              Math.abs(red - cornerColor.red) +
              Math.abs(green - cornerColor.green) +
              Math.abs(blue - cornerColor.blue);

            visible = alpha > 20 && colorDifference > 42;
          }

          if (visible) {
            left = Math.min(left, x);
            top = Math.min(top, y);
            right = Math.max(right, x);
            bottom = Math.max(bottom, y);
          }
        }
      }

      if (right < left || bottom < top) {
        return {
          left: 0,
          top: 0,
          right: width - 1,
          bottom: height - 1
        };
      }

      return { left, top, right, bottom };
    }

    function drawRotatedKey(sourceCanvas, degrees) {
      const normalizedDegrees = ((degrees % 360) + 360) % 360;
      const radians = normalizedDegrees * Math.PI / 180;
      const sideways = normalizedDegrees === 90 || normalizedDegrees === 270;

      puzzleKeyCanvas.width = sideways ? sourceCanvas.height : sourceCanvas.width;
      puzzleKeyCanvas.height = sideways ? sourceCanvas.width : sourceCanvas.height;

      keyCanvasContext.clearRect(
        0,
        0,
        puzzleKeyCanvas.width,
        puzzleKeyCanvas.height
      );

      keyCanvasContext.save();
      keyCanvasContext.translate(
        puzzleKeyCanvas.width / 2,
        puzzleKeyCanvas.height / 2
      );
      keyCanvasContext.rotate(radians);
      keyCanvasContext.drawImage(
        sourceCanvas,
        -sourceCanvas.width / 2,
        -sourceCanvas.height / 2
      );
      keyCanvasContext.restore();
    }

    function updateKeyDisplaySize() {
      if (!keyPrepared) {
        return;
      }

      const stageRect = puzzleStage.getBoundingClientRect();

      if (stageRect.width === 0 || stageRect.height === 0) {
        return;
      }

      // 参考画像と同じように、鍵の高さを謎画像の約76％にします。
      // 横幅は鍵画像本来の縦横比から自動計算するため、引き延ばされません。
      const naturalAspect = keyNaturalSize.width / keyNaturalSize.height;
      let displayHeight = stageRect.height * puzzleKeyHeightRatio;
      let displayWidth = displayHeight * naturalAspect;

      // 横幅が画面を超える場合だけ、縦横比を維持したまま均等に縮小します。
      if (displayWidth > stageRect.width * 0.98) {
        const fitScale = (stageRect.width * 0.98) / displayWidth;
        displayWidth *= fitScale;
        displayHeight *= fitScale;
      }

      puzzleKeyCanvas.style.width = displayWidth + "px";
      puzzleKeyCanvas.style.height = displayHeight + "px";
    }

    // 謎画像の実際の縦横比を、そのまま操作画面へ反映します。
    // 画像が正方形でも長方形でも、余白や引き延ばしが発生しません。
    function updatePuzzleStageRatio() {
      if (!puzzlePaper.naturalWidth || !puzzlePaper.naturalHeight) {
        return;
      }

      puzzleStage.style.aspectRatio =
        puzzlePaper.naturalWidth + " / " + puzzlePaper.naturalHeight;
    }

    /* =========================================================
       画像重ね合わせ謎：開閉とドラッグ
       ========================================================= */

    resetKeyButton.addEventListener("click", resetKeyPosition);
    // 「資料を閉じる」を押したら、添付資料と返信メールを閉じ、
    // 最初のメール入力画面へ戻します。
    closePuzzleButton.addEventListener("click", closeReply);

    puzzleOverlay.addEventListener("click", function (event) {
      if (event.target === puzzleOverlay) {
        closePuzzle();
      }
    });

    puzzlePaper.addEventListener("load", function () {
      updatePuzzleStageRatio();

      if (puzzleOverlay.classList.contains("show")) {
        window.requestAnimationFrame(function () {
          updateKeyDisplaySize();
          keyPosition = clampKeyPosition(keyPosition.x, keyPosition.y);
          applyKeyPosition();
        });
      }
    });

    puzzlePaper.addEventListener("error", function () {
      showPuzzleError(
        puzzlePaperFile + "を読み込めません。HTMLと同じフォルダに画像を置いてください。"
      );
    });

    puzzleKeyCanvas.addEventListener("pointerdown", startKeyDrag);
    puzzleKeyCanvas.addEventListener("pointermove", moveKeyDrag);
    puzzleKeyCanvas.addEventListener("pointerup", endKeyDrag);
    puzzleKeyCanvas.addEventListener("pointercancel", endKeyDrag);
    puzzleKeyCanvas.addEventListener("lostpointercapture", endKeyDrag);

    window.addEventListener("resize", function () {
      if (puzzleOverlay.classList.contains("show")) {
        updateKeyDisplaySize();
        keyPosition = clampKeyPosition(keyPosition.x, keyPosition.y);
        applyKeyPosition();
      }
    });

    function openPuzzle() {
      clearPuzzleError();
      puzzleOverlay.classList.add("show");
      puzzleOverlay.setAttribute("aria-hidden", "false");

      updatePuzzleStageRatio();

      window.requestAnimationFrame(function () {
        if (keyPrepared) {
          updateKeyDisplaySize();
          resetKeyPosition();
          return;
        }

        prepareKeyImage().catch(function () {
          showPuzzleError(
            puzzleKeyFile + "を読み込めません。HTMLと同じフォルダに画像を置いてください。"
          );
        });
      });
    }

    function closePuzzle() {
      puzzleOverlay.classList.remove("show");
      puzzleOverlay.setAttribute("aria-hidden", "true");
      stopKeyDrag();
    }

    function resetKeyPosition() {
      keyPosition = {
        x: puzzleKeyStart.x,
        y: puzzleKeyStart.y
      };

      keyPosition = clampKeyPosition(keyPosition.x, keyPosition.y);
      applyKeyPosition();
    }

    function applyKeyPosition() {
      const stageRect = puzzleStage.getBoundingClientRect();

      puzzleKeyCanvas.style.left =
        (keyPosition.x / 100) * stageRect.width + "px";

      puzzleKeyCanvas.style.top =
        (keyPosition.y / 100) * stageRect.height + "px";
    }

    function clampKeyPosition(xPercent, yPercent) {
      const stageRect = puzzleStage.getBoundingClientRect();
      const keyRect = puzzleKeyCanvas.getBoundingClientRect();

      if (stageRect.width === 0 || stageRect.height === 0) {
        return { x: xPercent, y: yPercent };
      }

      const keyWidthPercent = (keyRect.width / stageRect.width) * 100;
      const keyHeightPercent = (keyRect.height / stageRect.height) * 100;

      return {
        x: Math.max(0, Math.min(xPercent, 100 - keyWidthPercent)),
        y: Math.max(0, Math.min(yPercent, 100 - keyHeightPercent))
      };
    }

    function startKeyDrag(event) {
      if (!keyPrepared) {
        return;
      }

      event.preventDefault();

      dragging = true;
      activePointerId = event.pointerId;

      const keyRect = puzzleKeyCanvas.getBoundingClientRect();
      dragOffsetX = event.clientX - keyRect.left;
      dragOffsetY = event.clientY - keyRect.top;

      puzzleKeyCanvas.classList.add("dragging");
      document.body.classList.add("drag-lock");
      puzzleKeyCanvas.setPointerCapture(event.pointerId);
    }

    function moveKeyDrag(event) {
      if (!dragging || event.pointerId !== activePointerId) {
        return;
      }

      event.preventDefault();

      const stageRect = puzzleStage.getBoundingClientRect();

      const newLeftPixels = event.clientX - stageRect.left - dragOffsetX;
      const newTopPixels = event.clientY - stageRect.top - dragOffsetY;

      const newXPercent = (newLeftPixels / stageRect.width) * 100;
      const newYPercent = (newTopPixels / stageRect.height) * 100;

      keyPosition = clampKeyPosition(newXPercent, newYPercent);
      applyKeyPosition();
    }

    function endKeyDrag(event) {
      if (!dragging) {
        return;
      }

      if (event && activePointerId !== null && event.pointerId !== activePointerId) {
        return;
      }

      stopKeyDrag();
      snapKeyIfNearTarget();

      // 正解位置に置かれたかを内部で確認します。
      // 数字や正解表示は画面には出しません。
      isKeyAtCorrectPosition();
    }

    function stopKeyDrag() {
      dragging = false;
      activePointerId = null;
      puzzleKeyCanvas.classList.remove("dragging");
      document.body.classList.remove("drag-lock");
    }

    function getDistanceFromTarget() {
      const differenceX = keyPosition.x - puzzleKeyTarget.x;
      const differenceY = keyPosition.y - puzzleKeyTarget.y;

      return Math.sqrt(
        differenceX * differenceX + differenceY * differenceY
      );
    }

    function snapKeyIfNearTarget() {
      if (getDistanceFromTarget() > puzzleSnapDistance) {
        return;
      }

      keyPosition = clampKeyPosition(
        puzzleKeyTarget.x,
        puzzleKeyTarget.y
      );

      applyKeyPosition();

      puzzleKeyCanvas.classList.remove("snapped");
      void puzzleKeyCanvas.offsetWidth;
      puzzleKeyCanvas.classList.add("snapped");
    }

    function isKeyAtCorrectPosition() {
      return getDistanceFromTarget() <= puzzleCorrectRange;
    }
  </script>
</body>
